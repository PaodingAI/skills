name: Release calliper-saas-markdown

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release archive
        env:
          ARCHIVE_NAME: calliper-saas-markdown-${{ github.ref_name }}.zip
        run: |
          rm -f "$ARCHIVE_NAME"
          cd calliper-saas-markdown
          zip -r "../$ARCHIVE_NAME" .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: calliper-saas-markdown-${{ github.ref_name }}.zip
          generate_release_notes: true
          overwrite_files: true
