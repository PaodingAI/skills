interface:
  display_name: "PDFlux SaaS Markdown"
  short_description: "Parse docs and tables from PDF, DOCX, and images"
  default_prompt: "Always execute the bundled scripts/upload_to_markdown.js script, which calls the latest synchronous /openapi/{serviceCode}/file/markdown API for one local PDF, DOCX, PPT, image, or similar file. Use PAODINGAI_API_KEY for Bearer authorization and PAODINGAI_API_BASE_URL as the base URL when provided. If the user explicitly asks to convert to markdown or output markdown, return markdown content directly when present in the API response; otherwise extract only the document content or tables needed for the task."
